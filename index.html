<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的浪漫小站</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:"Segoe UI", Arial, sans-serif;
background:linear-gradient(180deg,#1e1b4b,#312e81);
color:white;
}

header{
background:rgba(0,0,0,0.3);
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
backdrop-filter:blur(6px);
}

header h1{
margin:0;
font-size:22px;
letter-spacing:1px;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-size:15px;
opacity:0.9;
}

nav a:hover{opacity:1}

.hero{
text-align:center;
padding:150px 20px;
background:linear-gradient(135deg,#ff6ec4,#7873f5);
}

.hero h2{
font-size:56px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
opacity:0.95;
}

.btn{
margin-top:30px;
display:inline-block;
padding:14px 32px;
background:white;
color:#ff4fa3;
text-decoration:none;
border-radius:30px;
font-weight:bold;
}

.btn:hover{
transform:translateY(-2px);
}

.section{
padding:80px 20px;
text-align:center;
}

.section h2{
font-size:34px;
margin-bottom:40px;
}

.cards{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

.card{
background:rgba(255,255,255,0.08);
padding:30px;
width:260px;
border-radius:16px;
backdrop-filter:blur(6px);
transition:transform 0.3s, box-shadow 0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.love-text{
max-width:700px;
margin:auto;
font-size:18px;
line-height:1.8;
opacity:0.95;
}

.heart{
position:fixed;
color:#ff6ec4;
animation:float 6s linear infinite;
opacity:0.6;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

footer{
text-align:center;
padding:30px 20px;
background:#0f0c29;
margin-top:60px;
font-size:14px;
opacity:0.7;
}

@media (max-width:700px){

header{
flex-direction:column;
gap:10px;
}

.hero h2{
font-size:40px;
}

}

</style>

</head>

<body>

<header>
<h1>❤️ 我们的浪漫小站</h1>

<nav>
<a href="#home">首页</a>
<a href="#story">我们的故事</a>
<a href="#memories">回忆</a>
<a href="#love">告白</a>
</nav>
</header>

<section id="home" class="hero">

<h2>遇见你是最美的意外</h2>

<p>这是属于我们的专属小世界</p>

<a class="btn" href="#story">开始阅读</a>

</section>

<section id="story" class="section">

<h2>我们的故事</h2>

<div class="love-text">

<p>
也许世界很大，但我们刚好相遇。

从第一次见面，到慢慢熟悉，再到彼此陪伴。

这里记录着属于我们的每一个瞬间。
</p>

</div>

</section>

<section id="memories" class="section">

<h2>甜蜜回忆</h2>

<div class="cards">

<div class="card">
<h3>第一次见面</h3>
<p>那一天开始，一切都变得不一样了。</p>
</div>

<div class="card">
<h3>一起的时光</h3>
<p>普通的日子，因为你而变得闪闪发光。</p>
</div>

<div class="card">
<h3>未来</h3>
<p>希望未来的每一天，都有你在身边。</p>
</div>

</div>

</section>

<section id="love" class="section">

<h2>给你的话</h2>

<div class="love-text">

<p>
如果世界有尽头，我希望最后看到的人是你。

如果时间可以停留，我希望停在与你相视而笑的那一刻。

谢谢你来到我的世界 ❤️
</p>

</div>

</section>

<footer>

<p>❤️ 只属于我们的网页 | 2026</p>

</footer>

<!-- 飘动的爱心 -->

<script>

function createHeart(){

const heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(10+Math.random()*20)+"px"
heart.style.animationDuration=(4+Math.random()*4)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(createHeart,300)

</script>

</body>
</html>
